AWSTemplateFormatVersion: "2010-09-09"
Description: API Gateway + Lambda + Bedrock (Knowledge Base) + OpenSearch Serverless + IAM + VPC + CloudWatch logging with configurable AZ support

# -------------------------------
# Parameters
# -------------------------------
Parameters:
  Prefix:
    Type: String
    Description: Prefix for all resource names (e.g., mykb)
    MinLength: "1"
    MaxLength: "20"

  LambdaSourceBucketName:
    Type: String
    Description: S3 bucket containing the Lambda deployment package

  LambdaSourceKey:
    Type: String
    Description: Object key for the Lambda zip file in the above bucket

  KnowledgeBaseBucketName:
    Type: String
    Description: S3 bucket storing knowledge base documents

  KnowledgeBasePrefix:
    Type: String
    Description: Prefix pattern of the documents in the knowledge base bucket

  AvailabilityZoneCount:
    Type: Number
    Description: Number of Availability Zones to use (1 to 3)
    Default: "2"
    MinValue: "1"
    MaxValue: "3"

  OpenSearchServerlessMultiAZMode:
    Type: String
    Description: Enable OpenSearch Serverless Multi AZ mode to use (ON or OFF)
    Default: "OFF"
    AllowedValues: ["ON", "OFF"]
  
  EmbeddingModel:
    Type: String
    Description: Embedding Model for Knowledge base
    Default: "amazon.titan-embed-text-v1"
    AllowedValues: ["amazon.titan-embed-text-v1"]

  LogRetentionInDays:
    Type: Number
    Description: Log retention period in days (e.g., 7)
    Default: "7"
    MinValue: "1"

  SetupUserArn:
    Type: String
    Description: IAM Resouce ARN of Setup User
    Default: ""

# -------------------------------
# Conditions
# -------------------------------
Conditions:
  UseAZ1: !Or [!Equals [!Ref AvailabilityZoneCount, 1], !Equals [!Ref AvailabilityZoneCount, "2"], !Equals [!Ref AvailabilityZoneCount, "3"]]
  UseAZ2: !Or [!Equals [!Ref AvailabilityZoneCount, 2], !Equals [!Ref AvailabilityZoneCount, "3"]]
  UseAZ3: !Equals [!Ref AvailabilityZoneCount, "3" ]
  OpenSearchServerlessMultiAZ: !Equals [!Ref OpenSearchServerlessMultiAZMode, "ON" ]

# -------------------------------
# Resources
Resources: 

# 1. VPC & Networking
#   Resource List
#   | Resource | Explaination |
#   | ---      | ---
#   | VPC                                 | Defines the primary network boundary for this stack with DNS support/hostnames enabled.|
#   | PrivateSubnet1                      | Private subnet in AZ1. Used for isolated resources (e.g., Lambda ENIs, interface endpoints). No direct internet route.|
#   | PrivateSubnet2                      | (Optinal) Private subnet in AZ2. Mirrors AZ1 for high availability.|
#   | PrivateSubnet3                      | (Optinal) Private subnet in AZ3. Optional third AZ for higher resiliency.|
#   | PrivateRouteTable1                  | Route table dedicated to the AZ1 private subnet.|
#   | PrivateSubnetRouteTableAssociation1 | Associates the AZ1 private subnet with its route table.|
#   | PrivateRouteTable2                  | (Optinal) Route table dedicated to the AZ2 private subnet.|
#   | PrivateSubnetRouteTableAssociation2 | (Optinal) Associates the AZ2 private subnet with its route table.|
#   | PrivateRouteTable3                  | (Optinal) Route table dedicated to the AZ3 private subnet.|
#   | PrivateSubnetRouteTableAssociation3 | (Optinal) Associates the AZ3 private subnet with its route table.|
#   | EndpointSecurityGroup               | Security group for VPC endpoints; only allows traffic originating from the Lambda security group.|
#   | VPCEndpointS3                       | Gateway VPC endpoint for Amazon S3; keeps S3 traffic within the AWS network via route tables.|
#   | VPCEndpointBedrock                  | Interface VPC endpoint for Bedrock Agent Runtime; enables private API calls from private subnets with Private DNS.|
#   | VPCFlowLogGroup                     | CloudWatch Log Group to store VPC Flow Logs with a configured retention period.|
#   | VPCFlowLog                          | Enables VPC Flow Logs for traffic visibility and troubleshooting; delivers to CloudWatch Logs.|
#   | LambdaSecurityGroup                 | Security group attached to Lambda ENIs; used as the trusted source for endpoint access.|
#
# -------------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${Prefix}-vpc"

  PrivateSubnet1:
    Condition: UseAZ1
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub "${Prefix}-subnet-private-az1"

  PrivateSubnet2:
    Condition: UseAZ2
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub "${Prefix}-subnet-private-az2"

  PrivateSubnet3:
    Condition: UseAZ3
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub "${Prefix}-subnet-private-az3"

  PrivateRouteTable1:
    Condition: UseAZ1
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateSubnetRouteTableAssociation1:
    Condition: UseAZ1
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  PrivateRouteTable2:
    Condition: UseAZ2
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateSubnetRouteTableAssociation2:
    Condition: UseAZ2
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable2

  PrivateRouteTable3:
    Condition: UseAZ3
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PrivateSubnetRouteTableAssociation3:
    Condition: UseAZ3
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !Ref PrivateRouteTable3

  EndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow access from Lambda only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          SourceSecurityGroupId: !GetAtt LambdaSecurityGroup.GroupId

  VPCEndpointS3:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !If [UseAZ1, !Ref PrivateRouteTable1, !Ref "AWS::NoValue"]
        - !If [UseAZ2, !Ref PrivateRouteTable2, !Ref "AWS::NoValue"]
        - !If [UseAZ3, !Ref PrivateRouteTable3, !Ref "AWS::NoValue"]

  VPCEndpointBedrock:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.bedrock-agent-runtime"
      VpcEndpointType: Interface
      SubnetIds:
        - !If [UseAZ1, !Ref PrivateSubnet1, !Ref "AWS::NoValue"]
        - !If [UseAZ2, !Ref PrivateSubnet2, !Ref "AWS::NoValue"]
        - !If [UseAZ3, !Ref PrivateSubnet3, !Ref "AWS::NoValue"]
      SecurityGroupIds:
        - !Ref EndpointSecurityGroup
      PrivateDnsEnabled: true

  VPCFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/vpc/flowlogs/${Prefix}-vpc"
      RetentionInDays: !Ref LogRetentionInDays

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt LambdaExecutionRole.Arn
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref VPCFlowLogGroup
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: ALL

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda SG to access VPC endpoints
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${Prefix}-lambda-sg"

# 2. IAM Roles
#   Resource List
#   | Resource | Explaination |
#   | ---      | ---
#   | LambdaExecutionRole  | IAM role for Lambda functions to execute within the VPC and access required AWS services (Bedrock, CloudWatch Logs).|
#   | BedrockExecutionRole | IAM role for Amazon Bedrock Knowledge Base execution.|
#   | WaitFnRole           | IAM role for the "Wait" Lambda function, granting basic permissions to write logs to CloudWatch Logs.|
#
# -------------------------------

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Prefix}-lambda-execution-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${Prefix}-lambda-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
              - Effect: Allow
                Action:
                  - bedrock:*
                Resource: "*"
      Path: "/"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  BedrockExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Prefix}-bedrock-kb-execution-role"
      Path: "/"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement: 
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${Prefix}-bedrock-invokemodel-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}::foundation-model/${EmbeddingModel}"
        - PolicyName: !Sub "${Prefix}-s3-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource: 
                  - !Sub "arn:aws:s3:::${KnowledgeBaseBucketName}/${KnowledgeBasePrefix}*"
                  - !Sub "arn:aws:s3:::${KnowledgeBaseBucketName}"
        - PolicyName: !Sub "${Prefix}-opensearch-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - aoss:GetIndex
                  - aoss:APIAccessAll
                Resource: "*"

  WaitFnRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Prefix}-waitfn-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: lambdaBasicLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

# 3. OpenSearch Serverless
#   Resource List
#   | Resource | Explaination |
#   | ---      | ---
#   | OpenSearchCollection       | OpenSearch Serverless collection for storing and searching vector embeddings for the knowledge base.|
#   | OpenSearchIndex            | Vector index inside the OpenSearch Serverless collection.|
#   | OpenSearchAccessPolicy     | Access policy for the OpenSearch Serverless collection and index.|
#   | OpenSearchEncryptionPolicy | Encryption policy for OpenSearch Serverless collection.|
#   | OpenSearchNetworkPolicy    | Network policy for OpenSearch Serverless collection.|
#   | WaitForIndexReady          | Custom resource that waits until the OpenSearch index becomes ready before proceeding.|
#
# -------------------------------

  OpenSearchCollection:
    Type: AWS::OpenSearchServerless::Collection
    Properties:
      Name: !Sub "${Prefix}-collection"
      StandbyReplicas: !If [OpenSearchServerlessMultiAZ, "ENABLED", "DISABLED"]
      Type: VECTORSEARCH
      Description: OpenSearch collection for knowledge base
    DependsOn: [OpenSearchEncryptionPolicy, OpenSearchAccessPolicy, OpenSearchNetworkPolicy]

  OpenSearchIndex:
    Type: AWS::OpenSearchServerless::Index
    Properties:
      CollectionEndpoint: !Sub "https://${OpenSearchCollection}.${AWS::Region}.aoss.amazonaws.com"
      IndexName: !Sub "${Prefix}-index"
      Mappings: 
        Properties: 
          kb-vector-field: 
            Type: knn_vector
            Dimension: 1536
            Method:
              Name: hnsw
              Engine: faiss
              Parameters:
                M: 16
                EfConstruction: 512
              SpaceType: l2
          AMAZON_BEDROCK_METADATA:
            Type: text
            Index: false
          AMAZON_BEDROCK_TEXT:
            Type: text
            Index: true
          AMAZON_BEDROCK_TEXT_CHUNK:
            Type: text
            Index: true
          id: 
            Type: text
            Index: true
          x-amz-bedrock-kb-data-source-id: 
            Type: text
            Index: true
          x-amz-bedrock-kb-document-page-number: 
            Type: text
            Index: true
          x-amz-bedrock-kb-source-uri:
            Type: text
            Index: true
      Settings:
        Index: 
          Knn: true
          KnnAlgoParamEfSearch: 512

  OpenSearchAccessPolicy:
    Type: AWS::OpenSearchServerless::AccessPolicy
    Properties:
      Name: !Sub "${Prefix}-access-policy"
      Type: data
      Policy: 
        !Sub >-
          [
            {
              "Description":"Access from bedrock-knowledgebase",
              "Rules":[
                {
                  "ResourceType":"index",
                  "Resource":["index/${Prefix}-collection/*"],
                  "Permission":[
                    "aoss:CreateIndex",
                    "aoss:UpdateIndex",
                    "aoss:DescribeIndex",
                    "aoss:DeleteIndex",
                    "aoss:ReadDocument",
                    "aoss:WriteDocument"
                    
                  ]
                },
                {
                  "ResourceType":"collection",
                  "Resource":["collection/${Prefix}-collection"],
                  "Permission":[
                    "aoss:DescribeCollectionItems",
                    "aoss:CreateCollectionItems",
                    "aoss:UpdateCollectionItems",
                    "aoss:DeleteCollectionItems"
                  ]
                }
              ],
              "Principal":[
                "${BedrockExecutionRole.Arn}",
                "${SetupUserArn}"
              ]
            }
          ]

  OpenSearchEncryptionPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${Prefix}-encryption-policy"
      Type: encryption
      Policy: 
        !Sub >-
          {
            "Rules":[
              {
                "ResourceType":"collection",
                "Resource":[
                  "collection/${Prefix}-collection"
                ]
              }
            ],
            "AWSOwnedKey":true
          }

  OpenSearchNetworkPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${Prefix}-network-policy"
      Type: network
      Policy: 
        !Sub >-
          [
            {
              "Rules":[
                {
                  "ResourceType":"dashboard",
                  "Resource":[
                    "collection/${Prefix}-collection"
                  ]
                },
                {
                  "ResourceType":"collection",
                  "Resource":[
                    "collection/${Prefix}-collection"
                  ]
                }
              ],
              "AllowFromPublic":true
            }
          ]

  WaitForIndexReady:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt WaitFnForOpenSearchIndex.Arn
      Seconds: 30
    DependsOn: [OpenSearchIndex]

# 4. Bedrock Knowledge Base
#   Resource List
#   | Resource | Explaination |
#   | ---      | ---
#   | KnowledgeBase           | Bedrock Knowledge Base configured to use OpenSearch Serverless for vector search.|
#   | KnowledgeBaseDataSource | Data source for the Bedrock Knowledge Base pointing to an S3 bucket.|
#
# -------------------------------
  KnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    Properties:
      Name: !Sub "${Prefix}-knowledge-base"
      Description: Knowledge Base using OpenSearch for vector search
      RoleArn: !GetAtt BedrockExecutionRole.Arn
      StorageConfiguration:
        Type: "OPENSEARCH_SERVERLESS"
        OpensearchServerlessConfiguration:
          CollectionArn: !GetAtt OpenSearchCollection.Arn
          VectorIndexName: !Select [0, !Split ["|", !Ref OpenSearchIndex]]
          FieldMapping: 
            VectorField: "kb-vector-field"
            TextField: "AMAZON_BEDROCK_TEXT"
            MetadataField: "AMAZON_BEDROCK_METADATA"
      KnowledgeBaseConfiguration:
        Type: "VECTOR"
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub "arn:${AWS::Partition}:bedrock:${AWS::Region}::foundation-model/${EmbeddingModel}"
    DependsOn: [WaitForIndexReady]

  KnowledgeBaseDataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      KnowledgeBaseId: !Ref KnowledgeBase
      Name: !Sub "${Prefix}-kb-source"
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !Sub "arn:aws:s3:::${KnowledgeBaseBucketName}"
          BucketOwnerAccountId: !Ref AWS::AccountId
          InclusionPrefixes: [!Ref KnowledgeBasePrefix]
      VectorIngestionConfiguration:
        ChunkingConfiguration:
          ChunkingStrategy: FIXED_SIZE
          FixedSizeChunkingConfiguration:
            MaxTokens: 500
            OverlapPercentage: 10
        

# 5. Lambda(Function + LogGroup + Env Vars)
#   Resource List
#   | Resource | Explaination |
#   | ---      | ---
#   | LambdaLogGroup                   | CloudWatch Logs group for the main Lambda function.|
#   | LambdaFunction                   | Main Lambda function that handles Knowledge Base search requests.|
#   | WaitFnForOpenSearchIndex         | Lambda function that acts as a CloudFormation custom resource to wait for a given time.|
#
# -------------------------------

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${Prefix}-handler"
      RetentionInDays: !Ref LogRetentionInDays

  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${Prefix}-handler"
      Code:
        S3Bucket: !Ref LambdaSourceBucketName
        S3Key: !Ref LambdaSourceKey
      Handler: ./dist/handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: nodejs22.x
      Timeout: 25
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !If [UseAZ1, !Ref PrivateSubnet1, !Ref "AWS::NoValue"]
          - !If [UseAZ2, !Ref PrivateSubnet2, !Ref "AWS::NoValue"]
          - !If [UseAZ3, !Ref PrivateSubnet3, !Ref "AWS::NoValue"]
      Environment:
        Variables:
          FOUNDATION_MODEL_ID: "anthropic.claude-3-haiku-20240307-v1:0"
          KNOWLEDGE_BASE_ID: !Ref KnowledgeBase

  WaitFnForOpenSearchIndex:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Prefix}-waitfn'
      Runtime: nodejs22.x
      Handler: index.handler
      Role: !GetAtt WaitFnRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          const https = require('https');
          const url = require('url');
          const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

          function sendResponse(event, context, status, data, physicalId) {
            const responseBody = JSON.stringify({
              Status: status,
              Reason: `See details in CloudWatch Log Stream: ${context.logStreamName}`,
              PhysicalResourceId: physicalId || context.logStreamName,
              StackId: event.StackId,
              RequestId: event.RequestId,
              LogicalResourceId: event.LogicalResourceId,
              NoEcho: false,
              Data: data || {}
            });

            const parsed = url.parse(event.ResponseURL);
            const opts = {
              hostname: parsed.hostname,
              port: 443,
              path: parsed.path,
              method: 'PUT',
              headers: {
                'content-type': '',
                'content-length': Buffer.byteLength(responseBody)
              }
            };

            return new Promise((resolve, reject) => {
              const req = https.request(opts, (res) => {
                res.on('data', () => {});
                res.on('end', resolve);
              });
              req.on('error', reject);
              req.write(responseBody);
              req.end();
            });
          }

          exports.handler = async (event, context) => {
            console.log(event);
            console.log(context);
            const physicalId = event.PhysicalResourceId || 'SleepResource';
            try {
              const props = event.ResourceProperties || {};
              const seconds = Number(props.Seconds || 30);
              if (event.RequestType === 'Delete') {
                await sendResponse(event, context, 'SUCCESS', { Skipped: true }, physicalId);
                return;
              }

              console.log(`Sleeping for ${seconds} seconds...`);
              await sleep(seconds * 1000);
              await sendResponse(event, context, 'SUCCESS', { SleptSeconds: seconds }, physicalId);
            } catch (err) {
              console.error('Sleep custom resource error:', err);
              try {
                await sendResponse(event, context, 'FAILED', { Error: String(err) }, physicalId);
              } catch (e) {
                console.error('Failed to send CFN response:', e);
              }
            }
          };

# 6. API Gateway
#   Resource List
#   | Resource | Explaination |
#   | ---      | ---
#   | ApiLogGroup            | CloudWatch Logs group for API Gateway access logs.|
#   | HttpApi                | HTTP API Gateway that exposes the Knowledge Base search endpoint.|
#   | ApiIntegration         | API Gateway integration that connects the HTTP API to the Lambda function.|
#   | ApiRoute               | API Gateway route for POST requests to /search.|
#   | ApiStage               | API Gateway stage configuration for the production environment.|
#   | LambdaInvokePermission | Lambda permission resource to allow API Gateway to invoke the Lambda function.|
#
# -------------------------------

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${Prefix}-access"
      RetentionInDays: !Ref LogRetentionInDays

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${Prefix}-http-api"
      ProtocolType: HTTP
      Description: API Gateway endpoint for Knowledge Base search

  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations"
      PayloadFormatVersion: '2.0'

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /search"
      Target: !Sub "integrations/${ApiIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: prod
      AutoDeploy: true
      AccessLogSettings:
        DestinationArn: !GetAtt ApiLogGroup.Arn
        Format: '{"requestId":"$context.requestId","status":"$context.status","latency":"$context.responseLatency","ip":"$context.identity.sourceIp"}'

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/search"

# 7. Outputs
# -------------------------------

Outputs:
  VPCId:
    Description: The ID of the created VPC
    Value: !Ref VPC

  OpenSearchCollectionName:
    Description: The name of the OpenSearch Serverless collection
    Value: !Ref OpenSearchCollection
  
  OpenSearchIndexName:
    Description: The name of the OpenSearch Serverless Index
    Value: !Select [0, !Split ["|", !Ref OpenSearchIndex]]

  KnowledgeBaseId:
    Description: The ID of the Bedrock Knowledge Base
    Value: !Ref KnowledgeBase

  DataSourceId:
    Description: The ID of the Bedrock Knowledge Base DataSource
    Value: !GetAtt KnowledgeBaseDataSource.DataSourceId

  ApiEndpoint:
    Description: The HTTP API endpoint for search
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/search"

  LambdaFunctionArn:
    Description: The ARN of the Lambda function
    Value: !GetAtt LambdaFunction.Arn